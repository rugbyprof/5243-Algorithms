<svg width="100%" viewBox="0 0 720 540" role="img" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <title>Ternary Search Tree Diagram</title>
  <desc>Ternary Search Tree for words bat, can, cat. Each node stores one character with three children: L (char less than node), M (char matches, advance to next), R (char greater than node). Words: bat follows c-left-b-mid-a-mid-t; cat follows c-mid-a-mid-t; can follows c-mid-a-mid-t-left-n.</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="360" y="22" text-anchor="middle" font-size="14" font-weight="600" fill="rgb(194,192,182)">Ternary Search Tree</text>
  <text x="360" y="40" text-anchor="middle" font-size="11" fill="rgb(120,118,110)">inserting: "bat"  "can"  "cat"</text>

  <!-- ==================== EDGES ==================== -->

  <!-- c → b  [LEFT — 'b' < 'c', go left]  dashed blue -->
  <line x1="342" y1="87" x2="173" y2="198" stroke="rgb(93,150,220)" stroke-width="2" stroke-dasharray="7,4" marker-end="url(#arr)"/>
  <text x="237" y="130" font-size="11" fill="rgb(93,150,220)">L ('b' &lt; 'c')</text>

  <!-- c → a₁  [MIDDLE — 'c' matches, advance]  solid gray -->
  <line x1="376" y1="90" x2="484" y2="195" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="447" y="128" font-size="11" fill="rgb(194,192,182)">M</text>

  <!-- b → a₂  [MIDDLE — 'b' matches, advance]  solid gray -->
  <line x1="155" y1="232" x2="155" y2="318" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="163" y="278" font-size="11" fill="rgb(194,192,182)">M</text>

  <!-- a₁ → t₁  [MIDDLE — 'a' matches, advance]  solid gray -->
  <line x1="500" y1="232" x2="500" y2="318" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="508" y="278" font-size="11" fill="rgb(194,192,182)">M</text>

  <!-- a₂ → t₂  [MIDDLE — 'a' matches, advance]  solid gray -->
  <line x1="155" y1="362" x2="155" y2="443" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="163" y="406" font-size="11" fill="rgb(194,192,182)">M</text>

  <!-- t₁ → n  [LEFT — 'n' < 't', go left]  dashed blue -->
  <line x1="484" y1="355" x2="376" y2="450" stroke="rgb(93,150,220)" stroke-width="2" stroke-dasharray="7,4" marker-end="url(#arr)"/>
  <text x="440" y="393" font-size="11" fill="rgb(93,150,220)">L ('n' &lt; 't')</text>

  <!-- ==================== NODES ==================== -->

  <!-- c — root, comparing position 0 -->
  <circle cx="360" cy="75" r="22" fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="1.5"/>
  <text x="360" y="75" text-anchor="middle" dominant-baseline="central" font-size="17" font-weight="500" fill="rgb(211,209,199)">c</text>
  <text x="360" y="108" text-anchor="middle" font-size="9" fill="rgb(100,98,90)">pos 0</text>

  <!-- b — left child of c, comparing position 0 -->
  <circle cx="155" cy="210" r="22" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="1.5"/>
  <text x="155" y="210" text-anchor="middle" dominant-baseline="central" font-size="17" font-weight="500" fill="rgb(159,225,203)">b</text>
  <text x="155" y="243" text-anchor="middle" font-size="9" fill="rgb(70,130,105)">pos 0</text>

  <!-- a — middle child of c, comparing position 1 -->
  <circle cx="500" cy="210" r="22" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="1.5"/>
  <text x="500" y="207" text-anchor="middle" dominant-baseline="central" font-size="17" font-weight="500" fill="rgb(159,225,203)">a</text>
  <!-- subscript 1 -->
  <text x="514" y="218" font-size="9" fill="rgb(93,202,165)">1</text>
  <text x="500" y="243" text-anchor="middle" font-size="9" fill="rgb(70,130,105)">pos 1</text>

  <!-- a — middle child of b, comparing position 1 -->
  <circle cx="155" cy="340" r="22" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="1.5"/>
  <text x="155" y="337" text-anchor="middle" dominant-baseline="central" font-size="17" font-weight="500" fill="rgb(159,225,203)">a</text>
  <!-- subscript 2 -->
  <text x="169" y="348" font-size="9" fill="rgb(93,202,165)">2</text>
  <text x="155" y="373" text-anchor="middle" font-size="9" fill="rgb(70,130,105)">pos 1</text>

  <!-- t — middle child of a₁, end of "cat", comparing position 2 -->
  <circle cx="500" cy="340" r="22" fill="rgb(80,65,8)" stroke="rgb(202,180,93)" stroke-width="2"/>
  <text x="500" y="337" text-anchor="middle" dominant-baseline="central" font-size="17" font-weight="500" fill="rgb(225,210,159)">t</text>
  <!-- subscript 1 -->
  <text x="514" y="348" font-size="9" fill="rgb(202,180,93)">1</text>
  <text x="500" y="373" text-anchor="middle" font-size="9" fill="rgb(70,130,105)">pos 2</text>
  <text x="500" y="386" text-anchor="middle" font-size="10" fill="rgb(160,140,60)">"cat" ✓</text>

  <!-- t — middle child of a₂, end of "bat", comparing position 2 -->
  <circle cx="155" cy="465" r="22" fill="rgb(80,65,8)" stroke="rgb(202,180,93)" stroke-width="2"/>
  <text x="155" y="462" text-anchor="middle" dominant-baseline="central" font-size="17" font-weight="500" fill="rgb(225,210,159)">t</text>
  <!-- subscript 2 -->
  <text x="169" y="473" font-size="9" fill="rgb(202,180,93)">2</text>
  <text x="155" y="500" text-anchor="middle" font-size="10" fill="rgb(160,140,60)">"bat" ✓</text>

  <!-- n — left child of t₁, end of "can", comparing position 2 -->
  <circle cx="360" cy="465" r="22" fill="rgb(80,65,8)" stroke="rgb(202,180,93)" stroke-width="2"/>
  <text x="360" y="465" text-anchor="middle" dominant-baseline="central" font-size="17" font-weight="500" fill="rgb(225,210,159)">n</text>
  <text x="360" y="500" text-anchor="middle" font-size="10" fill="rgb(160,140,60)">"can" ✓</text>

  <!-- ==================== LEGEND ==================== -->
  <line x1="28" y1="525" x2="58" y2="525" stroke="rgb(156,154,146)" stroke-width="1.5"/>
  <text x="63" y="529" font-size="10" fill="rgb(156,154,146)">M: char matches → advance to next position</text>
  <line x1="28" y1="540" x2="58" y2="540" stroke="rgb(93,150,220)" stroke-width="2" stroke-dasharray="7,4"/>
  <text x="63" y="544" font-size="10" fill="rgb(93,150,220)">L: current char &lt; node char → go left subtree</text>
  <circle cx="495" cy="525" r="6" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="1.5"/>
  <text x="506" y="529" font-size="10" fill="rgb(156,154,146)">internal</text>
  <circle cx="556" cy="525" r="6" fill="rgb(80,65,8)" stroke="rgb(202,180,93)" stroke-width="1.5"/>
  <text x="567" y="529" font-size="10" fill="rgb(160,140,60)">end of word</text>
  <text x="495" y="544" font-size="10" fill="rgb(100,98,90)">a₁ a₂ / t₁ t₂ = same char, distinct nodes on different paths</text>
</svg>
