<svg width="100%" viewBox="0 0 820 530" role="img" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <title>Radix Tree vs Standard Trie</title>
  <desc>Side-by-side: standard trie (left, 6 nodes) vs radix tree (right, 5 nodes) for words cat, car, card. The single-child chain c→a is compressed into one edge labeled "ca".</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Section headers -->
  <text x="200" y="22" text-anchor="middle" font-size="14" font-weight="600" fill="rgb(194,192,182)">Standard Trie</text>
  <text x="615" y="22" text-anchor="middle" font-size="14" font-weight="600" fill="rgb(194,192,182)">Radix Tree</text>

  <!-- Divider -->
  <line x1="408" y1="30" x2="408" y2="510" stroke="rgb(68,68,65)" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Compression arrow label between sections -->
  <text x="408" y="165" text-anchor="middle" font-size="11" fill="rgb(120,118,110)">compress</text>
  <text x="408" y="180" text-anchor="middle" font-size="11" fill="rgb(120,118,110)">c → a</text>
  <text x="408" y="195" text-anchor="middle" font-size="11" fill="rgb(120,118,110)">into "ca"</text>

  <!-- ==================== LEFT: STANDARD TRIE ==================== -->

  <!-- EDGES -->
  <!-- root → c -->
  <line x1="200" y1="77" x2="200" y2="133" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="210" y="111" font-size="12" fill="rgb(194,192,182)">c</text>

  <!-- c → a -->
  <line x1="200" y1="177" x2="200" y2="233" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="210" y="211" font-size="12" fill="rgb(194,192,182)">a</text>

  <!-- a → t  -->
  <line x1="187" y1="272" x2="129" y2="347" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="143" y="314" font-size="12" fill="rgb(194,192,182)">t</text>

  <!-- a → r -->
  <line x1="213" y1="272" x2="268" y2="347" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="254" y="314" font-size="12" fill="rgb(194,192,182)">r</text>

  <!-- r → d -->
  <line x1="280" y1="387" x2="280" y2="443" stroke="rgb(156,154,146)" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="290" y="420" font-size="12" fill="rgb(194,192,182)">d</text>

  <!-- NODES -->
  <!-- root -->
  <circle cx="200" cy="55" r="22" fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="1.5"/>
  <text x="200" y="55" text-anchor="middle" dominant-baseline="central" font-size="12" fill="rgb(211,209,199)">root</text>

  <!-- c — single char, internal -->
  <circle cx="200" cy="155" r="22" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="1.5"/>
  <text x="200" y="155" text-anchor="middle" dominant-baseline="central" font-size="16" font-weight="500" fill="rgb(159,225,203)">c</text>

  <!-- a — single char, internal -->
  <circle cx="200" cy="255" r="22" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="1.5"/>
  <text x="200" y="255" text-anchor="middle" dominant-baseline="central" font-size="16" font-weight="500" fill="rgb(159,225,203)">a</text>

  <!-- t — end of "cat" -->
  <circle cx="120" cy="365" r="22" fill="rgb(80,65,8)" stroke="rgb(202,180,93)" stroke-width="2"/>
  <text x="120" y="361" text-anchor="middle" dominant-baseline="central" font-size="16" font-weight="500" fill="rgb(225,210,159)">t</text>
  <text x="120" y="398" text-anchor="middle" font-size="10" fill="rgb(160,140,60)">"cat"</text>

  <!-- r — end of "car" (also internal for "card") -->
  <circle cx="280" cy="365" r="22" fill="rgb(80,65,8)" stroke="rgb(202,180,93)" stroke-width="2"/>
  <text x="280" y="361" text-anchor="middle" dominant-baseline="central" font-size="16" font-weight="500" fill="rgb(225,210,159)">r</text>
  <text x="280" y="398" text-anchor="middle" font-size="10" fill="rgb(160,140,60)">"car"</text>

  <!-- d — end of "card" -->
  <circle cx="280" cy="465" r="22" fill="rgb(80,65,8)" stroke="rgb(202,180,93)" stroke-width="2"/>
  <text x="280" y="461" text-anchor="middle" dominant-baseline="central" font-size="16" font-weight="500" fill="rgb(225,210,159)">d</text>
  <text x="280" y="498" text-anchor="middle" font-size="10" fill="rgb(160,140,60)">"card"</text>

  <!-- Node count -->
  <text x="200" y="516" text-anchor="middle" font-size="11" fill="rgb(120,118,110)">6 nodes — one per character</text>

  <!-- ==================== RIGHT: RADIX TREE ==================== -->

  <!-- EDGES -->
  <!-- root → [ca]  (straight down) -->
  <line x1="615" y1="77" x2="615" y2="184" stroke="rgb(100,93,202)" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="627" y="135" font-size="12" fill="rgb(170,165,230)">"ca"</text>

  <!-- [ca] → [t]  (down-left) -->
  <line x1="606" y1="216" x2="538" y2="340" stroke="rgb(100,93,202)" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="548" y="282" font-size="12" fill="rgb(170,165,230)">"t"</text>

  <!-- [ca] → [r]  (down-right) -->
  <line x1="624" y1="216" x2="691" y2="328" stroke="rgb(100,93,202)" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="670" y="274" font-size="12" fill="rgb(170,165,230)">"r"</text>

  <!-- [r] → [d]  (straight down) -->
  <line x1="699" y1="356" x2="699" y2="438" stroke="rgb(100,93,202)" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="711" y="401" font-size="12" fill="rgb(170,165,230)">"d"</text>

  <!-- NODES -->
  <!-- root -->
  <circle cx="615" cy="55" r="22" fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="1.5"/>
  <text x="615" y="55" text-anchor="middle" dominant-baseline="central" font-size="12" fill="rgb(211,209,199)">root</text>

  <!-- [ca] — compressed node (rect = stores substring, not single char) -->
  <rect x="583" y="186" width="64" height="30" rx="8" fill="rgb(25,20,80)" stroke="rgb(100,93,202)" stroke-width="2"/>
  <text x="615" y="201" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="rgb(175,170,230)">"ca"</text>

  <!-- [t] — end of "cat" (compressed rect, gold) -->
  <rect x="503" y="340" width="52" height="28" rx="8" fill="rgb(80,65,8)" stroke="rgb(202,180,93)" stroke-width="2"/>
  <text x="529" y="354" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="rgb(225,210,159)">"t"</text>
  <text x="529" y="385" text-anchor="middle" font-size="10" fill="rgb(160,140,60)">"cat"</text>

  <!-- [r] — end of "car" (compressed rect, gold) -->
  <rect x="673" y="328" width="52" height="28" rx="8" fill="rgb(80,65,8)" stroke="rgb(202,180,93)" stroke-width="2"/>
  <text x="699" y="342" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="rgb(225,210,159)">"r"</text>
  <text x="699" y="373" text-anchor="middle" font-size="10" fill="rgb(160,140,60)">"car"</text>

  <!-- [d] — end of "card" (compressed rect, gold) -->
  <rect x="673" y="438" width="52" height="28" rx="8" fill="rgb(80,65,8)" stroke="rgb(202,180,93)" stroke-width="2"/>
  <text x="699" y="452" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="rgb(225,210,159)">"d"</text>
  <text x="699" y="483" text-anchor="middle" font-size="10" fill="rgb(160,140,60)">"card"</text>

  <!-- Node count -->
  <text x="615" y="516" text-anchor="middle" font-size="11" fill="rgb(120,118,110)">5 nodes — single-child chain merged</text>

  <!-- ==================== LEGEND ==================== -->
  <circle cx="430" cy="516" r="7" fill="rgb(8,80,65)" stroke="rgb(93,202,165)" stroke-width="1.5"/>
  <text x="442" y="520" font-size="10" fill="rgb(156,154,146)">internal</text>
  <circle cx="498" cy="516" r="7" fill="rgb(80,65,8)" stroke="rgb(202,180,93)" stroke-width="1.5"/>
  <text x="510" y="520" font-size="10" fill="rgb(156,154,146)">end of word</text>
  <rect x="571" y="509" width="18" height="14" rx="3" fill="rgb(25,20,80)" stroke="rgb(100,93,202)" stroke-width="1.5"/>
  <text x="594" y="520" font-size="10" fill="rgb(156,154,146)">compressed edge</text>
</svg>
