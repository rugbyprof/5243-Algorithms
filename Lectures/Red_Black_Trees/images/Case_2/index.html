<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Case 2 — Uncle BLACK, Triangle (Inner Child)</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background-color: #0d0000;
    background-image: url("../redblacktree.jpg");
    background-size: cover;
    background-position: center top;
    background-attachment: fixed;
    color: #eee;
    font-family: "Segoe UI", system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 32px 16px;
    gap: 22px;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.68);
    z-index: 0;
  }
  body > * { position: relative; z-index: 1; }
  h1 {
    font-size: 1.5rem;
    letter-spacing: 0.06em;
    color: #ff3c00;
    text-align: center;
    text-shadow: 0 0 12px rgba(255,60,0,0.9), 0 0 28px rgba(200,0,0,0.6), 0 0 60px rgba(160,0,0,0.35);
  }
  .step-label {
    font-size: 1rem;
    color: #cc9988;
    min-height: 1.4em;
    text-align: center;
    letter-spacing: 0.02em;
  }
  .frame-box {
    background: #f9f9f9;
    border-radius: 10px;
    box-shadow: 0 0 0 2px rgba(180,0,0,0.5), 0 0 28px rgba(220,30,0,0.4), 0 12px 40px rgba(0,0,0,0.85);
    overflow: hidden;
    max-width: 820px;
    width: 100%;
  }
  .frame-box img { width: 100%; display: block; }
  .nav { display: flex; align-items: center; gap: 28px; }
  .nav button {
    background: rgba(20,0,0,0.75);
    color: #ff6644;
    border: 2px solid #cc2200;
    border-radius: 8px;
    padding: 10px 30px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s, box-shadow 0.15s;
    letter-spacing: 0.06em;
    text-shadow: 0 0 8px rgba(255,80,0,0.6);
  }
  .nav button:hover:not(:disabled) {
    background: #cc2200; color: #fff; border-color: #ff4400;
    box-shadow: 0 0 18px rgba(200,30,0,0.7);
  }
  .nav button:disabled { opacity: 0.25; cursor: default; }
  .counter { font-size: 1.1rem; color: #bb9988; min-width: 80px; text-align: center; }
  .hint { font-size: 0.78rem; color: #664444; letter-spacing: 0.04em; }
</style>
</head>
<body>
<h1>Case 2 — Uncle BLACK, Triangle (Inner Child)</h1>
<div class="step-label" id="step-label"></div>
<div class="frame-box">
  <img id="frame-img" src="" alt="slide">
</div>
<div class="nav">
  <button id="btn-prev" onclick="go(-1)">&#8592; Prev</button>
  <span class="counter" id="counter"></span>
  <button id="btn-next" onclick="go(1)">Next &#8594;</button>
</div>
<div class="hint">Arrow keys ← → also work</div>
<script>
  const frames = ["2.1.png", "2.2.png", "2.3.png", "2.4.png", "2.5.png", "2.6.png"];
  const labels = ["Setup: G(B) with left child P(R)", "Insert N \u2014 right child of left parent P \u2192 TRIANGLE shape", "Violation: triangle shape \u2014 Uncle BLACK \u2192 Case 2", "Rotate LEFT at P \u2192 triangle becomes a line \u2192 Case 3", "Rotate RIGHT at G (Case 3) \u2014 N promoted, pre-recolor", "Color swap: N\u2192BLACK, G\u2192RED  \u2713  All rules satisfied"];
  let cur = 0;
  function render() {
    document.getElementById("frame-img").src = frames[cur];
    document.getElementById("step-label").textContent = labels[cur];
    document.getElementById("counter").textContent = (cur+1) + " / " + frames.length;
    document.getElementById("btn-prev").disabled = cur === 0;
    document.getElementById("btn-next").disabled = cur === frames.length - 1;
  }
  function go(dir) {
    const n = cur + dir;
    if (n >= 0 && n < frames.length) { cur = n; render(); }
  }
  document.addEventListener("keydown", e => {
    if (e.key === "ArrowRight") go(1);
    if (e.key === "ArrowLeft")  go(-1);
  });
  render();
</script>
</body>
</html>
